<div class="stats-grid">
    <div class="stat">
        <span class="stat-value">{{ repo.indexed_files }}</span>
        <span class="stat-label">Plikow</span>
    </div>
    <div class="stat">
        <span class="stat-value">{{ repo.total_chunks }}</span>
        <span class="stat-label">Chunkow</span>
    </div>
    <div class="stat">
        <span class="stat-value">{{ repo.last_indexed | format_time }}</span>
        <span class="stat-label">Ostatni index</span>
    </div>
</div>

{% if message %}
<div class="alert success">{{ message }}</div>
{% endif %}

<div id="index-progress"
     hx-get="/repos/{{ repo.id }}/index/status"
     hx-trigger="none"
     hx-swap="innerHTML">
</div>

<div class="stats-actions">
    <button class="btn btn-primary"
            hx-post="/repos/{{ repo.id }}/index"
            hx-target="#stats-panel"
            hx-swap="innerHTML"
            hx-vals='{"incremental": "true"}'
            onclick="startIndexPolling('{{ repo.id }}')">
        Indeksuj (incremental)
    </button>
    <button class="btn btn-secondary"
            hx-post="/repos/{{ repo.id }}/index"
            hx-target="#stats-panel"
            hx-swap="innerHTML"
            hx-vals='{"incremental": "false"}'
            hx-confirm="Pelne re-indeksowanie moze potrwac dluzej. Kontynuowac?"
            onclick="startIndexPolling('{{ repo.id }}')">
        Re-indeksuj (pelny)
    </button>
</div>

<script>
function startIndexPolling(repoId) {
    var el = document.getElementById('index-progress');
    if (!el) return;
    el.innerHTML = '<div class="indexing-progress"><span class="progress-pulse"></span> Rozpoczynam indeksowanie...</div>';
    var interval = setInterval(function() {
        fetch('/repos/' + repoId + '/index/status')
            .then(function(r) { return r.text(); })
            .then(function(html) {
                el.innerHTML = html;
                if (!html || html.trim() === '') clearInterval(interval);
            })
            .catch(function() { clearInterval(interval); });
    }, 2000);
}
</script>
