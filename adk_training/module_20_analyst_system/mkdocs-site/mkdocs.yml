site_name: AI Analyst System
site_description: "Autonomiczny analityk projektowy oparty na AI"
site_author: "Comarch IoT Connect Team"

theme:
  name: material
  language: pl
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Tryb ciemny
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Tryb jasny
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - toc.integrate
    - content.code.copy
    - content.tabs.link
  icon:
    logo: material/brain
    repo: fontawesome/brands/git-alt

extra:
  generator: false
  social:
    - icon: fontawesome/solid/building
      link: https://comarch.com
      name: Comarch

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mermaid-fix.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - "Strona główna": index.md
  - Produkt:
    - "Dlaczego AI Analyst": overview/why.md
    - "Możliwości": overview/capabilities.md
  - Architektura:
    - "Przegląd": architecture/index.md
    - "System dwupętlowy": architecture/dual-loop.md
    - Topologie: architecture/orchestrators.md
  - Platforma: tools/index.md
